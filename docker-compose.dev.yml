# =============================================================================
# TrackLink - Docker Compose (Development Overrides)
# =============================================================================
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
# =============================================================================

version: '3.9'

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL - Expose port for local tools (pgAdmin, DBeaver, etc.)
  # ---------------------------------------------------------------------------
  postgres:
    ports:
      - "5432:5432"

  # ---------------------------------------------------------------------------
  # Redis - Expose port for local debugging
  # ---------------------------------------------------------------------------
  redis:
    ports:
      - "6379:6379"

  # ---------------------------------------------------------------------------
  # Backend - Hot reload with volume mount
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./backend:/app
    environment:
      - BACKEND_DEBUG=true
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ---------------------------------------------------------------------------
  # Frontend - Dev server with hot reload
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0
